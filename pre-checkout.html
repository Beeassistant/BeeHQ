<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirm Your Purchase — Side Hustle Lab</title>
<style>
  :root {
    --bg: #0a0a0f; --bg2: #111118; --bg3: #1a1a24; --text: #f0f0f5; --text-dim: #8888a0;
    --accent: #7c3aed; --accent2: #a855f7; --accent-grad: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
    --accent-bg: rgba(124,58,237,0.1); --border: rgba(255,255,255,0.08); --card-bg: #111118;
    --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
  .container { max-width: 500px; width: 100%; margin: 0 auto; }
  .checkout-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px 30px; text-align: center; }
  h1 { font-size: 1.8rem; font-weight: 800; background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
  .subtitle { color: var(--text-dim); margin-bottom: 24px; font-size: 0.95rem; }
  .product-info { background: var(--bg3); border-radius: var(--radius-sm); padding: 20px; margin-bottom: 20px; text-align: left; }
  .product-info h3 { font-size: 1.1rem; margin-bottom: 8px; color: var(--text); }
  .product-info p { font-size: 0.88rem; color: var(--text-dim); margin-bottom: 8px; }
  .product-price { font-size: 1.5rem; font-weight: 800; background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .product-price.free { color: var(--success); background: none; -webkit-text-fill-color: var(--success); }
  .discount-row { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
  .discount-row input { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 0.9rem; color: var(--text); font-family: inherit; outline: none; transition: border-color 0.2s; }
  .discount-row input:focus { border-color: var(--accent); }
  .discount-row input.valid { border-color: var(--success); color: var(--success); }
  .discount-row input.invalid { border-color: var(--danger); color: var(--danger); }
  .discount-row button { padding: 10px 16px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-dim); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; font-family: inherit; }
  .discount-row button:hover { border-color: var(--accent); color: var(--text); }
  .discount-applied { display: flex; align-items: center; gap: 8px; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 16px; font-size: 0.88rem; color: var(--success); font-weight: 600; }
  .form-group { margin-bottom: 16px; text-align: left; }
  .form-label { display: block; font-size: 0.88rem; color: var(--text-dim); margin-bottom: 6px; }
  .form-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 1rem; color: var(--text); font-family: inherit; outline: none; transition: border-color 0.2s; }
  .form-input:focus { border-color: var(--accent); }
  .consent-checkbox { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 20px; padding: 14px; background: var(--bg3); border-radius: var(--radius-sm); border: 1px solid var(--border); }
  .consent-checkbox input[type="checkbox"] { margin-top: 3px; accent-color: var(--accent); width: 16px; height: 16px; flex-shrink: 0; }
  .consent-checkbox label { font-size: 0.82rem; color: var(--text-dim); line-height: 1.5; cursor: pointer; }
  .consent-checkbox a { color: var(--accent2); text-decoration: underline; }
  .btn-pay { display: block; width: 100%; padding: 14px; background: var(--accent-grad); border: none; border-radius: var(--radius-sm); color: white; font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; font-family: inherit; text-align: center; text-decoration: none; }
  .btn-pay:hover { opacity: 0.9; }
  .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-free { display: block; width: 100%; padding: 14px; background: var(--success); border: none; border-radius: var(--radius-sm); color: white; font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; font-family: inherit; text-align: center; text-decoration: none; }
  .btn-free:hover { opacity: 0.9; }
  .note { font-size: 0.78rem; color: var(--text-dim); margin-top: 20px; }
  .error-message { color: var(--danger); font-size: 0.85rem; margin-top: -10px; margin-bottom: 10px; text-align: left; }
  .payment-section { display: none; }
  .payment-section.show { display: block; }
  .free-section { display: none; }
  .free-section.show { display: block; }
  @media (max-width: 600px) { .checkout-card { padding: 30px 20px; } h1 { font-size: 1.5rem; } }
</style>
</head>
<body>
<div class="container">
  <div class="checkout-card">
    <h1 id="pageTitle">Confirm Your Purchase</h1>
    <p class="subtitle" id="pageSubtitle">Enter your email to receive your report</p>

    <div class="product-info" id="productInfo"></div>

    <!-- Discount code input -->
    <div class="discount-row" id="discountRow">
      <input type="text" id="discountCode" placeholder="Discount code (optional)" maxlength="20">
      <button type="button" id="applyDiscountBtn">Apply</button>
    </div>
    <div class="discount-applied" id="discountAppliedMsg" style="display:none;">
      ✓ Discount code applied — <span id="discountName"></span>
    </div>

    <!-- Payment section (Stripe redirect) -->
    <div class="payment-section" id="paymentSection">
      <form id="preCheckoutForm">
        <div class="form-group">
          <label for="customerEmail" class="form-label">Email Address</label>
          <input type="email" id="customerEmail" class="form-input" placeholder="you@example.com" required>
          <div class="error-message" id="emailError"></div>
        </div>
        <div class="consent-checkbox">
          <input type="checkbox" id="gdprConsent" required>
          <label for="gdprConsent">I agree to receive the purchased report and future updates from Side Hustle Lab. My data will be handled according to the <a href="#" target="_blank">Privacy Policy</a>.</label>
        </div>
        <div class="error-message" id="consentError"></div>
        <button type="submit" id="continueButton" class="btn-pay">Continue to Payment →</button>
        <p class="note">You will be redirected to Stripe for secure payment. Report will be emailed within 10 minutes.</p>
      </form>
    </div>

    <!-- Free section (no payment) -->
    <div class="free-section" id="freeSection">
      <form id="freeForm">
        <div class="form-group">
          <label for="freeEmail" class="form-label">Email Address</label>
          <input type="email" id="freeEmail" class="form-input" placeholder="you@example.com" required>
          <div class="error-message" id="freeEmailError"></div>
        </div>
        <div class="consent-checkbox">
          <input type="checkbox" id="freeGdprConsent" required>
          <label for="freeGdprConsent">I agree to receive the free report and future updates from Side Hustle Lab. My data will be handled according to the <a href="#" target="_blank">Privacy Policy</a>.</label>
        </div>
        <div class="error-message" id="freeConsentError"></div>
        <button type="submit" id="freeButton" class="btn-free">Get My Free Report →</button>
        <p class="note" style="margin-top:12px;">⚡ Your report link will be sent instantly. No payment. No catch.</p>
      </form>
    </div>

    <a href="index.html" class="back-link" style="display: block; margin-top: 30px; font-size: 0.9rem; color: var(--text-dim); text-decoration: none;">← Back to Side Hustle Lab</a>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const VALID_CODES = {
    'FREE24H': { name: '100% OFF — Free 24 Hours', discount: 1.0 }
  };

  let appliedCode = null;
  let isFree = false;

  // Check for pre-filled code from campaign
  const campaignCode = localStorage.getItem('free24h_code');
  if (campaignCode && VALID_CODES[campaignCode]) {
    appliedCode = campaignCode;
    isFree = true;
  }

  const pageTitle = document.getElementById('pageTitle');
  const pageSubtitle = document.getElementById('pageSubtitle');
  const productInfo = document.getElementById('productInfo');
  const discountRow = document.getElementById('discountRow');
  const discountCodeInput = document.getElementById('discountCode');
  const applyDiscountBtn = document.getElementById('applyDiscountBtn');
  const discountAppliedMsg = document.getElementById('discountAppliedMsg');
  const discountName = document.getElementById('discountName');
  const paymentSection = document.getElementById('paymentSection');
  const freeSection = document.getElementById('freeSection');

  const preCheckoutForm = document.getElementById('preCheckoutForm');
  const freeForm = document.getElementById('freeForm');
  const continueButton = document.getElementById('continueButton');
  const freeButton = document.getElementById('freeButton');
  const customerEmailInput = document.getElementById('customerEmail');
  const freeEmailInput = document.getElementById('freeEmail');

  const urlParams = new URLSearchParams(window.location.search);
  const type = urlParams.get('type'); // 'paid' or 'custom'

  let reportName = '';
  let reportPrice = 0;
  let reportLink = ''; // direct link for free delivery

  if (type === 'paid') {
    reportName = localStorage.getItem('selectedReportName') || 'Selected Report';
    reportPrice = parseFloat(localStorage.getItem('selectedReportPrice')) || 7;
    reportLink = localStorage.getItem('selectedReportLink') || '';

    pageTitle.textContent = `Get Your ${reportName} Report`;
    pageSubtitle.textContent = `Confirm details and enter your email`;

    const priceDisplay = isFree
      ? '<span class="product-price free">FREE</span>'
      : `<span class="product-price">$${reportPrice}</span>`;
    productInfo.innerHTML = `
      <h3>${reportName}</h3>
      <p>Side Hustle Lab Validation Report</p>
      ${priceDisplay}
    `;

  } else if (type === 'custom') {
    const customReportIdea = localStorage.getItem('customReportIdea') || 'Custom idea';
    reportName = 'Custom Side Hustle Report';
    reportPrice = 25;
    reportLink = ''; // custom reports need manual handling

    const priceDisplay = isFree
      ? '<span class="product-price free">FREE</span>'
      : `<span class="product-price">$${reportPrice}</span>`;
    productInfo.innerHTML = `
      <h3>${reportName}</h3>
      <p>Your Idea: ${customReportIdea}</p>
      ${priceDisplay}
    `;

  } else {
    productInfo.innerHTML = '<p style="color: var(--danger);">Error: Invalid purchase. Please go back and select a report.</p>';
    discountRow.style.display = 'none';
    return;
  }

  // Show correct section (free or paid)
  if (isFree) {
    paymentSection.classList.remove('show');
    freeSection.classList.add('show');
    discountRow.style.display = 'none';
    discountAppliedMsg.style.display = 'flex';
    discountName.textContent = VALID_CODES[appliedCode].name;
    discountCodeInput.value = appliedCode;
    discountCodeInput.classList.add('valid');
    pageTitle.textContent = `Get Your FREE ${reportName}`;
    pageSubtitle.textContent = `100% off applied — no payment required`;
  } else {
    paymentSection.classList.add('show');
    freeSection.classList.remove('show');
    discountRow.style.display = 'flex';
    discountAppliedMsg.style.display = 'none';
  }

  // Apply discount code button
  applyDiscountBtn.addEventListener('click', () => {
    const code = discountCodeInput.value.trim().toUpperCase();
    if (VALID_CODES[code]) {
      appliedCode = code;
      isFree = true;
      const promo = VALID_CODES[code];

      // Update UI to free mode
      discountRow.style.display = 'none';
      discountAppliedMsg.style.display = 'flex';
      discountName.textContent = promo.name;
      paymentSection.classList.remove('show');
      freeSection.classList.add('show');

      const priceEls = productInfo.querySelectorAll('.product-price');
      priceEls.forEach(el => { el.classList.add('free'); el.textContent = 'FREE'; });
      pageTitle.textContent = `Get Your FREE ${reportName}`;
      pageSubtitle.textContent = `${promo.name} — no payment required`;

    } else if (code) {
      discountCodeInput.classList.add('invalid');
      discountCodeInput.classList.remove('valid');
      setTimeout(() => { discountCodeInput.classList.remove('invalid'); }, 1500);
    }
  });

  discountCodeInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); applyDiscountBtn.click(); }
  });

  // Handle paid form submission
  preCheckoutForm.addEventListener('submit', (event) => {
    event.preventDefault();
    document.getElementById('emailError').textContent = '';
    document.getElementById('consentError').textContent = '';

    const customerEmail = customerEmailInput.value;
    const consentGiven = document.getElementById('gdprConsent').checked;

    if (!customerEmail) { document.getElementById('emailError').textContent = 'Email required.'; return; }
    if (!consentGiven) { document.getElementById('consentError').textContent = 'Please agree to continue.'; return; }

    localStorage.setItem('customerEmailForDelivery', customerEmail);
    localStorage.setItem('customerConsentForDelivery', 'true');
    localStorage.setItem('purchasedReportName', reportName);
    localStorage.setItem('purchasedReportPrice', reportPrice);
    localStorage.setItem('discountCodeUsed', appliedCode || 'none');

    // Redirect to Stripe
    let stripeLink = type === 'paid'
      ? localStorage.getItem('selectedReportPaidLink') || ''
      : 'https://buy.stripe.com/14A7wY2LL2i44cj9AF';

    const redirectUrl = new URL(stripeLink);
    redirectUrl.searchParams.set('client_reference_id', customerEmail);
    redirectUrl.searchParams.set('metadata[reportName]', encodeURIComponent(reportName));
    redirectUrl.searchParams.set('metadata[gdprConsent]', 'true');
    redirectUrl.searchParams.set('success_url', window.location.origin + '/thank-you-email.html?session_id={CHECKOUT_SESSION_ID}');
    redirectUrl.searchParams.set('cancel_url', window.location.origin + '/index.html');
    window.location.href = redirectUrl.toString();
  });

  // Handle free form submission
  freeForm.addEventListener('submit', (event) => {
    event.preventDefault();
    document.getElementById('freeEmailError').textContent = '';
    document.getElementById('freeConsentError').textContent = '';

    const freeEmail = freeEmailInput.value;
    const freeConsent = document.getElementById('freeGdprConsent').checked;

    if (!freeEmail) { document.getElementById('freeEmailError').textContent = 'Email required.'; return; }
    if (!freeConsent) { document.getElementById('freeConsentError').textContent = 'Please agree to continue.'; return; }

    // Save to leads
    const leads = JSON.parse(localStorage.getItem('shl_leads') || '[]');
    const already = leads.find(l => l.email === freeEmail);
    if (!already) {
      leads.push({
        email: freeEmail,
        source: 'free24h_checkout',
        date: new Date().toISOString(),
        code: appliedCode || 'none',
        reportName: reportName
      });
      localStorage.setItem('shl_leads', JSON.stringify(leads));
    }

    localStorage.setItem('customerEmailForDelivery', freeEmail);
    localStorage.setItem('customerConsentForDelivery', 'true');
    localStorage.setItem('purchasedReportName', reportName);
    localStorage.setItem('purchasedReportPrice', '0');
    localStorage.setItem('discountCodeUsed', appliedCode || 'FREE24H');

    // Redirect to thank you page
    window.location.href = 'thank-you-email.html?free=1&report=' + encodeURIComponent(reportName) + '&link=' + encodeURIComponent(reportLink);
  });
});
</script>
</body>
</html>
